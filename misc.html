<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miscellaneous - The Money Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0c0a0a;
    --stone: #1a1616;
    --crimson: #6e0f1a;
    --crimson-bright: #9c1d2b;
    --silver: #b8b0a4;
    --bone: #e7e0d3;
    --line: rgba(184, 176, 164, 0.18);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #201a1a 0%, var(--void) 60%);
    color: var(--bone);
    font-family: 'Cinzel', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  header {
    width: 100%;
    background: linear-gradient(180deg, var(--stone) 0%, var(--void) 100%);
    color: var(--bone);
    text-align: center;
    padding: 40px 20px 30px;
    border-bottom: 3px solid var(--crimson);
    box-shadow: 0 6px 24px rgba(0,0,0,0.6);
  }

  header h1 {
    margin: 0;
    font-family: 'UnifrakturCook', cursive;
    letter-spacing: 2px;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: var(--bone);
    text-shadow: 0 0 12px rgba(110, 15, 26, 0.7), 0 2px 2px rgba(0,0,0,0.8);
  }

  .back-link {
    display: inline-block;
    margin-top: 14px;
    color: var(--silver);
    text-decoration: none;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--crimson);
    padding-bottom: 2px;
  }

  .back-link:hover { color: var(--bone); }

  main {
    width: 100%;
    max-width: 640px;
    padding: 56px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .item-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .item-card {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--stone);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }

  .item-card img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--void);
    flex-shrink: 0;
  }

  .item-card span {
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 1rem;
    color: var(--bone);
  }

  .unavailable-btn {
    margin-top: 44px;
    display: inline-block;
    background: var(--void);
    color: var(--silver);
    padding: 16px 36px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px dashed var(--line);
    cursor: not-allowed;
    opacity: 0.6;
  }
</style>
</head>
<body>

  <header>
    <h1>Miscellaneous</h1>
    <a class="back-link" href="index.html">&larr; Back to store</a>
  </header>

  <main>
    <div class="item-list">

      <div class="item-card">
        <img src="images/misc-item1.jpg" alt="Acid Supply">
        <span>Acid Supply</span>
      </div>

      <!-- Item 2 -->
      <div class="item-card">
        <img src="images/misc-item2.jpg" alt="Niche Wankhede">
        <span>Niche Wankhede</span>
      </div>

    </div>

    <button class="unavailable-btn" disabled>Not For Sale (For Now)</button>
  </main>

</body>
</html>
